name: Send Emails

on:
  workflow_dispatch:
    inputs:
      run_reason:
        description: "Reason for manual run (optional)"
        required: false
        default: "Manual trigger"

  schedule:
    # IST = UTC+5:30
    # Morning batch:   9:30 AM IST = 4:00 AM UTC → Mon–Fri
    # Afternoon batch: 2:30 PM IST = 9:00 AM UTC → Mon–Thu only
    - cron: "0 4 * * 1-5" # Morning:   Mon–Fri
    - cron: "0 9 * * 1-4" # Afternoon: Mon–Thu

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Check if should skip (Fri afternoon)
        id: day_check
        run: |
          DAY=$(date +%u)
          HOUR=$(date +%H)
          echo "Day: $DAY, Hour (UTC): $HOUR"

          SKIP="false"
          if [ "$DAY" -eq 5 ] && [ "$HOUR" -ge 9 ]; then
            echo "Friday afternoon — skipping."
            SKIP="true"
          fi

          echo "skip=$SKIP" >> $GITHUB_OUTPUT

      - name: Checkout repo
        if: steps.day_check.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.day_check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.day_check.outputs.skip == 'false'
        run: npm install

      - name: Run email script
        if: steps.day_check.outputs.skip == 'false'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: node sendEmails.js

      - name: Commit updated CSV
        if: steps.day_check.outputs.skip == 'false'
        run: |
          git config --global user.name "automation-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          git pull --rebase origin main

          git add emails.csv

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update email status [$(date '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
